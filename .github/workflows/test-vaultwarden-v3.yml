name: Test Vaultwarden v3
"on":
  workflow_dispatch:
    inputs:
      case:
        description: Test case
        required: true
        default: all-fast
        type: choice
        options:
          - all-fast
          - check-only
          - check-release
          - check-latest
          - inject-bad
          - smoke
          - repeat
          - cache
          - full-matrix
      run_full_build:
        description: Allow Windows build (costs minutes)
        required: false
        default: false
        type: boolean
      test_version:
        description: Test version tag
        required: false
        default: "1.32.0"
  schedule:
    - cron: '0 6 * * *'

# IMPORTANT: reusable workflow build job needs contents: write
# GitHub validates this statically, even with dry_run=true
permissions:
  contents: write

jobs:
  check-release:
    if: github.event_name == 'schedule' || contains(fromJSON('["all-fast","check-only","all","full-matrix","check-release"]'), github.event.inputs.case || 'all-fast')
    uses: ./.github/workflows/vaultwarden-smart-build-v3.yml
    with:
      tag_choice: release
      dry_run: true
      test_case: T1-check-release
    permissions:
      contents: write
    secrets: inherit

  check-latest:
    if: contains(fromJSON('["all-fast","check-only","all","full-matrix","check-latest"]'), github.event.inputs.case || 'all-fast')
    uses: ./.github/workflows/vaultwarden-smart-build-v3.yml
    with:
      tag_choice: latest
      dry_run: true
      test_case: T2-check-latest
    permissions:
      contents: write
    secrets: inherit

  inject-bad:
    if: contains(fromJSON('["all-fast","check-only","all","full-matrix","inject-bad"]'), github.event.inputs.case || 'all-fast')
    uses: ./.github/workflows/vaultwarden-smart-build-v3.yml
    with:
      tag_choice: custom
      tag: "bad;rm -rf /"
      dry_run: true
      test_case: T3-inject
    permissions:
      contents: write
    secrets: inherit

  inject-bad-assert:
    needs: [inject-bad]
    if: always() && contains(fromJSON('["all-fast","check-only","all","full-matrix","inject-bad"]'), github.event.inputs.case || 'all-fast')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - run: |
          r="${{ needs.inject-bad.result }}"
          echo "inject-bad result=$r"
          if [ "$r" = "failure" ]; then
            echo "PASS injection rejected"
            exit 0
          else
            echo "FAIL expected failure got $r"
            exit 1
          fi

  inject-traversal:
    if: contains(fromJSON('["all-fast","check-only","all","full-matrix","inject-bad"]'), github.event.inputs.case || 'all-fast')
    uses: ./.github/workflows/vaultwarden-smart-build-v3.yml
    with:
      tag_choice: custom
      tag: "../../etc/passwd"
      dry_run: true
      test_case: T4-traversal
    permissions:
      contents: write
    secrets: inherit

  inject-traversal-assert:
    needs: [inject-traversal]
    if: always() && contains(fromJSON('["all-fast","check-only","all","full-matrix","inject-bad"]'), github.event.inputs.case || 'all-fast')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - run: |
          r="${{ needs.inject-traversal.result }}"
          [ "$r" = "failure" ] && echo PASS || { echo "FAIL $r"; exit 1; }

  inject-command:
    if: contains(fromJSON('["all-fast","all","full-matrix","inject-bad"]'), github.event.inputs.case || 'all-fast')
    uses: ./.github/workflows/vaultwarden-smart-build-v3.yml
    with:
      tag_choice: custom
      tag: "a`whoami`"
      dry_run: true
      test_case: T5-cmd
    permissions:
      contents: write
    secrets: inherit

  inject-command-assert:
    needs: [inject-command]
    if: always() && contains(fromJSON('["all-fast","all","full-matrix","inject-bad"]'), github.event.inputs.case || 'all-fast')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - run: |
          r="${{ needs.inject-command.result }}"
          [ "$r" = "failure" ] && echo PASS || { echo "FAIL $r"; exit 1; }

  # ---- real builds ----
  smoke:
    if: github.event.inputs.run_full_build == 'true' && contains(fromJSON('["all","full-matrix","smoke"]'), github.event.inputs.case || '')
    uses: ./.github/workflows/vaultwarden-smart-build-v3.yml
    with:
      tag_choice: custom
      tag: ${{ github.event.inputs.test_version || '1.32.0' }}
      force_build: true
      skip_release: true
      skip_cleanup: true
      test_case: SMOKE
    permissions:
      contents: write
    secrets: inherit

  smoke-assert:
    needs: [smoke]
    if: always() && github.event.inputs.run_full_build == 'true' && contains(fromJSON('["all","full-matrix","smoke"]'), github.event.inputs.case || '')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - run: |
          test -n "${{ needs.smoke.outputs.vaultwarden_version }}" || exit 1
          test -n "${{ needs.smoke.outputs.vaultwarden_sha }}" || exit 1
          echo "SMOKE PASS"

  repeat1:
    if: github.event.inputs.run_full_build == 'true' && contains(fromJSON('["all","full-matrix","repeat"]'), github.event.inputs.case || '')
    uses: ./.github/workflows/vaultwarden-smart-build-v3.yml
    with:
      tag_choice: custom
      tag: ${{ github.event.inputs.test_version || '1.32.0' }}
      force_build: true
      skip_release: true
      skip_cleanup: true
      test_case: REPEAT-1
    permissions:
      contents: write
    secrets: inherit

  repeat2:
    needs: [repeat1]
    if: github.event.inputs.run_full_build == 'true' && contains(fromJSON('["all","full-matrix","repeat"]'), github.event.inputs.case || '')
    uses: ./.github/workflows/vaultwarden-smart-build-v3.yml
    with:
      tag_choice: custom
      tag: ${{ github.event.inputs.test_version || '1.32.0' }}
      force_build: true
      skip_release: true
      skip_cleanup: true
      test_case: REPEAT-2
    permissions:
      contents: write
    secrets: inherit

  repeat-assert:
    needs: [repeat1, repeat2]
    if: always() && github.event.inputs.run_full_build == 'true' && contains(fromJSON('["all","full-matrix","repeat"]'), github.event.inputs.case || '')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - run: |
          echo "r1 ${{ needs.repeat1.outputs.vaultwarden_sha }}"
          echo "r2 ${{ needs.repeat2.outputs.vaultwarden_sha }}"
          test -n "${{ needs.repeat1.outputs.vaultwarden_sha }}"
          test -n "${{ needs.repeat2.outputs.vaultwarden_sha }}"
          echo "repeat PASS"

  cache1:
    if: github.event.inputs.run_full_build == 'true' && contains(fromJSON('["all","full-matrix","cache"]'), github.event.inputs.case || '')
    uses: ./.github/workflows/vaultwarden-smart-build-v3.yml
    with:
      tag_choice: custom
      tag: ${{ github.event.inputs.test_version || '1.32.0' }}
      force_build: true
      skip_release: true
      skip_cleanup: true
      test_case: CACHE-1
    permissions:
      contents: write
    secrets: inherit

  cache2:
    needs: [cache1]
    if: github.event.inputs.run_full_build == 'true' && contains(fromJSON('["all","full-matrix","cache"]'), github.event.inputs.case || '')
    uses: ./.github/workflows/vaultwarden-smart-build-v3.yml
    with:
      tag_choice: custom
      tag: ${{ github.event.inputs.test_version || '1.32.0' }}
      force_build: true
      skip_release: true
      skip_cleanup: true
      test_case: CACHE-2
    permissions:
      contents: write
    secrets: inherit

  summary:
    needs:
      - check-release
      - check-latest
      - inject-bad-assert
      - inject-traversal-assert
      - inject-command-assert
      - smoke-assert
      - repeat-assert
      - cache2
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - run: |
          cat <<'EOF'
          check-release: ${{ needs.check-release.result }}
          check-latest: ${{ needs.check-latest.result }}
          inject-bad: ${{ needs.inject-bad-assert.result }}
          traversal: ${{ needs.inject-traversal-assert.result }}
          command: ${{ needs.inject-command-assert.result }}
          smoke: ${{ needs.smoke-assert.result }}
          repeat: ${{ needs.repeat-assert.result }}
          cache: ${{ needs.cache2.result }}
          EOF
          fail=0
          for r in "${{ needs.check-release.result }}" "${{ needs.check-latest.result }}" "${{ needs.inject-bad-assert.result }}" "${{ needs.inject-traversal-assert.result }}" "${{ needs.inject-command-assert.result }}"; do
            case "$r" in success|skipped) ;; *) fail=1 ;; esac
          done
          exit $fail
